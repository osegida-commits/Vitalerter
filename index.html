    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap');
        
        body { 
            font-family: 'Heebo', sans-serif; 
            color: #3C3E54; 
            background-color: #ffffff; 
            margin: 0;
            padding: 0;
        }

        /* Three-Tone Brand Gradient */
        .brand-gradient {
            background: linear-gradient(90deg, #0E7586 0%, #289589 50%, #42B48B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Flat Button - No Shadow */
        .btn-primary { 
            background-color: #2080A6; 
            box-shadow: none !important; 
            border: none;
            color: white;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { 
            background-color: #1a6d8d; 
            transform: translateY(-1px);
        }

        .timeline-border {
            background: linear-gradient(to bottom, #0E7586, #289589, #42B48B);
        }

        .card-flat {
            border: 1px solid #f1f5f9;
            background: #ffffff;
        }
    </style>
</head>
